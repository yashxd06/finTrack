{% extends "base.html" %}
{% block title %}Sign In — FinTrack{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">◈</div>
      <h1 class="auth-title">FinTrack</h1>
      <p class="auth-sub">Personal Finance — SQL-powered</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               placeholder="alice@example.com"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-primary btn-full">Sign In →</button>
    </form>

    <p class="auth-switch">
      No account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
    <p class="auth-hint">Demo: <code>alice@example.com</code> / <code>password123</code></p>
  </div>
</div>
{% endblock %}
