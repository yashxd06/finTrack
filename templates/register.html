{% extends "base.html" %}
{% block title %}Register — FinTrack{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">◈</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Start tracking your finances</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Alice Sharma"/>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="alice@example.com"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="min 8 characters"/>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account →</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
